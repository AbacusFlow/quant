# 策略例行检查提醒:到点给 Telegram 发检查清单(只提醒,不做任何判断/操作)。
# - 每月 1 日:月度检查(实盘 vs 模拟净值偏差);1/4/7/10 月加季度对比项
# - 每年 6/12 月 12 日:半年深度评估(实盘自 2026-06-12 重启,每满半年一次)
# 改进原则(2026-06 约定):按计划跑、按规则改、情绪不投票;
# 单月亏损/眼红别的策略/盘感不对 → 都不是改动理由。
name: review-reminders

on:
  schedule:
    - cron: "47 1 1 * *"      # 每月 1 日 09:47 HKT
    - cron: "47 1 12 6,12 *"  # 每年 6/12 月 12 日 09:47 HKT 半年评估
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: 组装并发送提醒
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then echo "未配置 TG_BOT_TOKEN/TG_CHAT_ID,跳过"; exit 0; fi
          DAY=$(date -u -d '+8 hours' +%-d)
          MONTH=$(date -u -d '+8 hours' +%-m)
          REPORT="https://cyl-logan.github.io/quant/"
          if [ "$DAY" = "12" ]; then
            TEXT="【ETF量化】半年深度评估提醒
          ━━━━━━━━━━━━
          实盘已满半年,请对照回测做一次深度评估:
          1. 实盘年化/最大回撤是否落在回测合理区间(回测年化~23%,打对折也正常)
          2. 回撤若超过回测最大回撤的1.5倍 → 暂停加仓,深度复盘
          3. 是否连续12个月跑输ETF池等权 → 是则重新评估轮动价值
          4. 表现正常且本金计划加到10万 → 改 repo Variables: SIGNAL_MODE=ensemble, SIGNAL_CAPITAL=100000
          报告: $REPORT"
          elif [ "$MONTH" = "1" ] || [ "$MONTH" = "4" ] || [ "$MONTH" = "7" ] || [ "$MONTH" = "10" ]; then
            TEXT="【ETF量化】季度检查提醒
          ━━━━━━━━━━━━
          1. 实盘 vs 模拟净值偏差 >1% ? 是则查执行环节(滑点/手续费/漏单),不动策略
          2. 对比沪深300与ETF池等权:只看,不动
          3. 池内ETF有无清盘/长期停牌/规模萎缩 → 有则机械替换等价标的
          报告: $REPORT"
          else
            TEXT="【ETF量化】月度检查提醒
          ━━━━━━━━━━━━
          检查实盘 vs 模拟净值偏差:>1% 查执行环节(滑点/手续费/漏单),不动策略。
          提醒:单月盈亏不是改动理由,信号说了算。
          报告: $REPORT"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TEXT="(手动测试)
          $TEXT"
          fi
          RESP=$(curl -sS --fail --max-time 20 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" --data-urlencode "text=$TEXT")
          echo "$RESP" | grep -q '"ok" *: *true' || { echo "推送失败: $RESP"; exit 1; }
          echo "提醒已发送"
