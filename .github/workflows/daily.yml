# 跑信号(基于交易日收盘,数据源当日 15:00 收盘后夜间发布)→ Telegram 推送 →
# 提交信号日志 → 生成并部署 Pages 报告。信号日 T 收盘算信号、T+1 开盘执行。
#
# 触发方式:由外部 cron-job 服务通过 workflow_dispatch 定时触发(取代 GitHub 免费版
# 内置 schedule——后者高峰常迟到数小时,实测稳定迟约5h,不可靠)。外部 cron-job 准点触发,
# 仍按「交易日晚上跑出次日开盘信号、留整夜缓冲」的节奏配置。
# 重复触发安全:同一信号日期+模式幂等,不会重复记录/推送;节假日自动跳过。
name: daily-signal

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-signal
  cancel-in-progress: false

jobs:
  signal-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装依赖与中文字体
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk
          pip install -q -r requirements.txt

      - name: 运行每日信号
        id: signal
        env:
          SIGNAL_MODE: ${{ vars.SIGNAL_MODE || 'single' }}
          SIGNAL_CAPITAL: ${{ vars.SIGNAL_CAPITAL || '10000' }}
          SIGNAL_VOL_TARGET: ${{ vars.SIGNAL_VOL_TARGET || 'false' }}
        run: |
          set -o pipefail
          # 波动率目标开关由 repo Variable SIGNAL_VOL_TARGET 控制(true 翻开,默认 false);翻开无需改代码
          if [ "$SIGNAL_VOL_TARGET" = "true" ]; then VOL_FLAG="--vol-target"; else VOL_FLAG="--no-vol-target"; fi
          python daily_signal.py --mode "$SIGNAL_MODE" --capital "$SIGNAL_CAPITAL" $VOL_FLAG | tee signal_output.txt

      - name: 昨收校验(只告警不阻断)
        id: price_check
        run: |
          # 不用管道,避免 tee 吞掉退出码;启动失败(语法/import错误)也写 ⚠ 行,保持只告警不阻断
          python check_prices.py > price_check.txt 2>&1 \
            || echo "⚠ 昨收校验脚本启动失败(exit $?),见 CI 日志" >> price_check.txt
          cat price_check.txt
          if grep -q '⚠' price_check.txt; then
            echo "has_warn=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_warn=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 回撤检查(事件触发,只告警不阻断)
        id: risk_check
        env:
          SIGNAL_MODE: ${{ vars.SIGNAL_MODE || 'single' }}
          SIGNAL_CAPITAL: ${{ vars.SIGNAL_CAPITAL || '10000' }}
          SIGNAL_VOL_TARGET: ${{ vars.SIGNAL_VOL_TARGET || 'false' }}
        run: |
          # 回撤基线须与线上策略同口径,波动率目标随线上开关一并传入
          if [ "$SIGNAL_VOL_TARGET" = "true" ]; then VOL_FLAG="--vol-target"; else VOL_FLAG="--no-vol-target"; fi
          python check_risk.py --mode "$SIGNAL_MODE" --capital "$SIGNAL_CAPITAL" $VOL_FLAG > risk_check.txt 2>&1 \
            || echo "⚠ 回撤检查脚本启动失败(exit $?),见 CI 日志" >> risk_check.txt
          cat risk_check.txt
          if grep -q '⚠' risk_check.txt; then
            echo "has_alert=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alert=false" >> "$GITHUB_OUTPUT"
          fi

      # 先持久化日志再推送:提交失败则整个 job 失败且不发推送,
      # 重跑时 daily_signal 幂等(同信号日期+模式不重复记录),不会重复推送。
      - name: 提交信号日志
        id: commit_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/signal_log.csv output/executions.csv
          if git diff --cached --quiet; then
            echo "日志无变化"
            echo "new_signal=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "信号日志 $(date -u -d '+8 hours' '+%F')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "new_signal=true" >> "$GITHUB_OUTPUT"

      # 有新信号、数据校验告警或回撤告警时都推送(数据 stale 时往往无新信号,告警更要送达)
      - name: Telegram 推送
        if: steps.commit_log.outputs.new_signal == 'true' || steps.price_check.outputs.has_warn == 'true' || steps.risk_check.outputs.has_alert == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          NEW_SIGNAL: ${{ steps.commit_log.outputs.new_signal }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then echo "未配置 TG_BOT_TOKEN/TG_CHAT_ID,跳过推送"; exit 0; fi
          WARN=$(grep '⚠' price_check.txt 2>/dev/null || true)
          RISK=$(grep '⚠' risk_check.txt 2>/dev/null || true)
          ALERTS=""
          if [ -n "$WARN" ]; then
            ALERTS="数据校验告警:
          $WARN"
          fi
          if [ -n "$RISK" ]; then
            ALERTS="${ALERTS:+$ALERTS

          }回撤告警:
          $RISK"
          fi
          if [ "$NEW_SIGNAL" = "true" ]; then
            SIGNAL=$(grep "目标持仓" signal_output.txt | head -1)
            # 执行日措辞由 daily_signal.py 给出(今日/具体日期),不在此硬编码
            HEADER=$(grep "调仓指令" signal_output.txt | head -1 | sed 's/^-*[[:space:]]*//; s/[[:space:]]*-*$//')
            if grep -qE "买入|卖出" signal_output.txt; then
              TEXT="【ETF量化】开盘需调仓
          ━━━━━━━━━━━━
          $SIGNAL

          ${HEADER:-调仓指令:}
          $(grep -E '买入|卖出' signal_output.txt)

          ⚠ 请按6位证券代码下单,成交前核对代码一致(同指数基金名称相近,勿凭名称选)"
            else
              TEXT="【ETF量化】今日无操作
          ━━━━━━━━━━━━
          $SIGNAL"
            fi
            if [ -n "$ALERTS" ]; then
              TEXT="$TEXT

          $ALERTS"
            fi
          else
            TEXT="【ETF量化】告警
          ━━━━━━━━━━━━
          $ALERTS"
          fi
          # 末尾附 Pages 报告链接,点开即看实盘/模拟净值与明细
          TEXT="$TEXT

          📊 完整报告 https://cyl-logan.github.io/quant/"
          RESP=$(curl -sS --fail --max-time 20 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" --data-urlencode "text=$TEXT")
          echo "$RESP" | grep -q '"ok" *: *true' || { echo "推送失败: $RESP"; exit 1; }
          echo "推送成功"

      - name: 生成网页报告
        env:
          SIGNAL_MODE: ${{ vars.SIGNAL_MODE || 'single' }}
          SIGNAL_CAPITAL: ${{ vars.SIGNAL_CAPITAL || '10000' }}
          SIGNAL_VOL_TARGET: ${{ vars.SIGNAL_VOL_TARGET || 'false' }}
        run: |
          # 报告口径与线上信号一致(波动率目标随同一开关)
          if [ "$SIGNAL_VOL_TARGET" = "true" ]; then VOL_FLAG="--vol-target"; else VOL_FLAG="--no-vol-target"; fi
          python report_web.py --mode "$SIGNAL_MODE" --capital "$SIGNAL_CAPITAL" $VOL_FLAG

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
